name: Retail Ops Intelligence - CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  repository_dispatch:
    types: [ auto_retrain ]

permissions:
  id-token: write # Required for Workload Identity Federation
  contents: write # Needed if we update tags or dispatch
  actions: write

jobs:
  test-and-validate:
    name: Lint, Test, and dry-run Training
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt
        pip install flake8 pytest

    - name: Lint with flake8
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 backend/ --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings.
        flake8 backend/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Run Pytest Unit Tests
      run: |
        python -m pytest backend/training/test_pipeline.py

    - name: Run Dry-Run Pipeline Verification
      run: |
        if [ -f backend/data/online_retail_II.csv ]; then
          echo "Raw data found. Running dry-run training verification..."
          echo "ENVIRONMENT=local" > backend/.env
          echo "DATABASE_URL=sqlite:///retail_ops_dryrun.db" >> backend/.env
          echo "QUEUE_TYPE=local" >> backend/.env
          echo "MLFLOW_TRACKING_URI=sqlite:///mlruns_dryrun.db" >> backend/.env
          
          python backend/schema/init_db.py
          python backend/training/feature_engineering.py --source csv --sample-skus 2 --version v1.0.0-dryrun
          python backend/training/train.py
          python backend/training/gate_check.py
        else
          echo "Raw dataset CSV not found (gitignored). Skipping dry-run pipeline verification."
        fi


  build-and-deploy:
    name: Build Docker and Deploy to GCP Cloud Run
    runs-on: ubuntu-latest
    needs: test-and-validate
    if: ((github.event_name == 'push' && github.ref == 'refs/heads/main') || (github.event_name == 'repository_dispatch' && github.event.action == 'auto_retrain')) && secrets.GCP_WORKLOAD_IDENTITY_PROVIDER != ''

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Authenticate to Google Cloud via WIF
      id: auth
      uses: google-github-actions/auth@v1
      with:
        token_format: 'access_token'
        workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
        service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v1

    - name: Configure Docker for Artifact Registry
      run: |
        gcloud auth configure-docker ${{ secrets.GCP_REGION }}-docker.pkg.dev --quiet

    - name: Build and Tag Docker Image
      run: |
        IMAGE_NAME="${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/retail-ops-repo/retail-ops-serving:latest"
        docker build -t $IMAGE_NAME ./backend
        echo "IMAGE_NAME=$IMAGE_NAME" >> $GITHUB_ENV

    - name: Push Image to Artifact Registry
      run: |
        docker push $IMAGE_NAME

    - name: Deploy to GCP Cloud Run (Canary 10% Traffic split)
      run: |
        # Deploy as a new revision but send 0% traffic to it first
        gcloud run deploy retail-ops-service \
          --image ${{ env.IMAGE_NAME }} \
          --region ${{ secrets.GCP_REGION }} \
          --platform managed \
          --no-traffic \
          --allow-unauthenticated

        # Split traffic: 90% to current active revision, 10% to the new revision
        # We fetch the latest revision name we just deployed
        LATEST_REV=$(gcloud run revisions list --service retail-ops-service --region ${{ secrets.GCP_REGION }} --limit 1 --format="value(metadata.name)")
        
        # Split traffic 90% to old, 10% to new
        gcloud run services update-traffic retail-ops-service \
          --region ${{ secrets.GCP_REGION }} \
          --to-revisions LATEST_REV=10
        
        echo "Successfully deployed revision $LATEST_REV with 10% traffic split."
